<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ZEFRAM PLAYER NEO SE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>

    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-glow: 0 0 15px rgba(0, 242, 255, 0.8);
            --glass-border: rgba(255, 255, 255, 0.12);
            --metal-grad: conic-gradient(from 180deg at 50% 50%, #222, #555, #888, #555, #222);
            --font-main: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }

        body {
            background-color: #030305; color: #fff; margin: 0; 
            padding: 10px 5px; font-family: var(--font-main);
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            overflow: hidden; touch-action: none; position: fixed; width: 100%; height: 100%;
        }

        @keyframes title-breathing {
            0%, 100% { opacity: 0.6; text-shadow: 0 0 8px rgba(0, 242, 255, 0.5); }
            50% { opacity: 1; text-shadow: 0 0 20px var(--neon-blue), 0 0 30px var(--neon-blue); }
        }

        .player-canvas {
            width: 100%; max-width: 380px; height: 94vh;
            background: rgba(15, 15, 25, 0.6); backdrop-filter: blur(40px) saturate(160%); -webkit-backdrop-filter: blur(40px) saturate(160%);
            border: 1px solid var(--glass-border); border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 35px; padding: 15px; display: flex; flex-direction: column; position: relative;
        }

        .header-title { 
            text-align: center; font-size: 15px; font-weight: 900; letter-spacing: 2px; 
            color: var(--neon-blue); margin-bottom: 8px; text-transform: uppercase;
            animation: title-breathing 4s infinite ease-in-out;
        }

        .btn-unified { 
            background: rgba(255,255,255,0.03); border: 1px solid var(--neon-blue); 
            color: var(--neon-blue); font-weight: 800; cursor: pointer;
            display: inline-flex; align-items: center; justify-content: center;
            transition: background 0.5s ease-out, box-shadow 0.5s ease-out, transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-unified:active { 
            background: rgba(0, 242, 255, 0.4); color: #fff; 
            box-shadow: 0 0 25px var(--neon-blue), inset 0 0 10px var(--neon-blue);
            transform: scale(0.92);
            transition: 0.05s;
        }

        .meta-area { display: flex; align-items: center; gap: 12px; height: 80px; margin-bottom: 10px; position: relative; z-index: 10; }
        .art-box { width: 80px; height: 80px; border-radius: 12px; background: #000; border: 1.5px solid rgba(255, 255, 255, 0.1); overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .art-box img { width: 100%; height: 100%; object-fit: contain; }
        .info-col { flex: 1; min-width: 0; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 2px 0; }
        .title-style { font-size: 16px; font-weight: 900; color: #fff; line-height: 1.2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .artist-style { font-size: 12px; font-weight: 700; color: var(--neon-blue); opacity: 0.8; }
        .time-file-row { display: flex; justify-content: space-between; align-items: flex-end; width: 100%; }
        #m-time { font-size: 13px; font-weight: 900; font-variant-numeric: tabular-nums; }
        .btn-select { border-radius: 6px; height: 22px; width: 45px; font-size: 9px; }

        .seek-container { margin: 0px 0 15px 0; padding: 0 20px; position: relative; z-index: 5; }
        .tag-lane { height: 28px; position: relative; }
        .ab-tag { 
            position: absolute; width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid var(--neon-blue); 
            background: #000; display: flex; align-items: center; justify-content: center; 
            font-size: 14px; font-weight: 900; top: 50%; transform: translate(-50%, -50%); 
            color: var(--neon-blue); z-index: 100; box-shadow: 0 0 10px rgba(0,0,0,0.8);
            transition: box-shadow 0.4s; /* scaleアニメーションを除去 */
        }
        .ab-tag:active { box-shadow: 0 0 20px var(--neon-blue); } /* 大きさは変えず光だけ */
        
        .main-lane { height: 34px; position: relative; display: flex; align-items: center; cursor: pointer; }
        .main-lane-bg { position: absolute; width: 100%; height: 8px; background: rgba(255,255,255,0.08); border-radius: 4px; }
        .v-marker { position: absolute; width: 2px; height: 16px; background: #fff; z-index: 20; top: 50%; transform: translate(-50%, -50%); }
        .bar-y { position: absolute; height: 5px; background: var(--neon-blue); z-index: 3; border-radius: 3px; box-shadow: 0 0 10px var(--neon-blue); }
        .bar-w { position: absolute; height: 5px; background: #fff; z-index: 3; opacity: 0.2; border-radius: 3px; }
        .head-knob { position: absolute; width: 22px; height: 22px; border-radius: 50%; background: #fff; z-index: 30; transform: translateX(-50%); box-shadow: 0 0 12px #fff; }

        .ab-jump-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 8px; }
        #ab-txt { color: var(--neon-blue); font-weight: 900; font-size: 16px; min-width: 130px; text-align: center; text-shadow: 0 0 12px rgba(0, 242, 255, 0.4); }
        .btn-cyber-small { border-radius: 10px; padding: 8px 0; flex: 1; font-size: 12px; height: 36px; }

        .control-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 10px; flex: 1; min-height: 0; }
        .play-col { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; margin-left: 20px; } 
        
        .metal-btn-wrap { 
            aspect-ratio: 1/1; width: 70px; border-radius: 50%; background: var(--metal-grad); 
            padding: 3px; display: flex; align-items: center; justify-content: center; 
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.5s ease-out; cursor: pointer;
        }
        .metal-btn-wrap:active { 
            transform: scale(0.88); box-shadow: 0 0 30px var(--neon-blue); 
            transition: 0.05s;
        }
        .metal-btn-inner { width: 100%; height: 100%; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #252525, #050505); }
        .metal-btn-inner svg { width: 34px; height: 34px; fill: var(--neon-blue); transition: fill 0.5s, filter 0.5s; }
        .metal-btn-wrap:active svg { fill: #fff; filter: drop-shadow(0 0 15px var(--neon-blue)); transition: 0.05s; }

        .tempo-panel { 
            background: rgba(255, 255, 255, 0.04); border-radius: 25px; padding: 15px; border: 1px solid var(--glass-border); 
            display: grid; grid-template-columns: 1fr 45px; grid-template-rows: auto 1fr; height: 100%; position: relative; 
        }
        .tempo-header { grid-column: 1; grid-row: 1; text-align: left; margin-bottom: 12px; }
        .tempo-label { font-size: 11px; color: var(--neon-blue); font-weight: 800; }
        .tempo-val-wrapper { color: #fff; font-size: 20px; font-weight: 900; }
        .tempo-buttons-left { grid-column: 1; grid-row: 2; display: flex; flex-direction: column; gap: 12px; justify-content: center; padding-right: 10px; }
        
        .btn-tempo-rect { 
            width: 100%; height: 42px; border-radius: 12px; font-size: 24px; 
            display: flex; align-items: center; justify-content: center; 
            padding-bottom: 2px; /* 全体的な微調整 */
        }
        /* マイナスボタン専用のセンター調整 */
        .btn-minus { padding-bottom: 6px; } 

        .btn-reset-rect { font-size: 11px; text-transform: uppercase; padding-bottom: 0; }

        .slider-column { grid-column: 2; grid-row: 1 / span 2; position: relative; height: 100%; display: flex; justify-content: center; }
        .tempo-lane-bg { position: absolute; height: 100%; width: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; left: 50%; transform: translateX(-50%); }
        .t-marker { position: absolute; height: 2px; width: 16px; background: rgba(255,255,255,0.3); left: 50%; transform: translateX(-50%); }
        
        .v-slider { 
            -webkit-appearance: none; appearance: none; 
            position: absolute; top: 50%; left: 50%; height: 30px; 
            background: transparent; transform: translate(-50%, -50%) rotate(-90deg); 
            z-index: 20; cursor: pointer; margin: 0; padding: 0;
        }
        .v-slider::-webkit-slider-thumb { 
            -webkit-appearance: none; width: 26px; height: 26px; border-radius: 50%; 
            background: #fff; box-shadow: 0 0 15px #fff; border: 2px solid #333;
            transition: transform 0.2s;
        }
        .v-slider:active::-webkit-slider-thumb { transform: scale(1.3); }
    </style>
</head>
<body>

<div class="player-canvas">
    <div class="header-title">ZEFRAM PLAYER NEO SE</div>
    
    <div class="meta-area">
        <div id="art-box" class="art-box"></div>
        <div class="info-col">
            <div class="title-style" id="m-tit">No File</div>
            <div class="artist-style" id="m-art">Select track</div>
            <div class="time-file-row">
                <div id="m-time">00:00 / 00:00</div>
                <button class="btn-unified btn-select" id="file-trigger">FILE</button>
            </div>
        </div>
        <input type="file" id="f-in" hidden accept="audio/*">
    </div>

    <div class="seek-container" id="seek-cont">
        <div class="tag-lane"><div class="ab-tag" id="tag-a" style="left:0" onmousedown="dragStart(event, 'A')" ontouchstart="dragStart(event, 'A')">A</div></div>
        <div class="main-lane" onmousedown="dragStart(event, 'P')" ontouchstart="dragStart(event, 'P')">
            <div class="main-lane-bg">
                <div id="v-a-mid" class="v-marker" style="left:0"></div>
                <div id="v-b-mid" class="v-marker" style="left:100%"></div>
            </div>
            <div id="bar-y" class="bar-y"></div><div id="bar-w" class="bar-w"></div><div id="head-knob" class="head-knob"></div>
        </div>
        <div class="tag-lane"><div class="ab-tag" id="tag-b" style="left:100%" onmousedown="dragStart(event, 'B')" ontouchstart="dragStart(event, 'B')">B</div></div>
    </div>

    <div class="ab-jump-row">
        <button class="btn-unified btn-cyber-small" onclick="setPoint('A')">A ▶</button>
        <div id="ab-txt">00:00 - 00:00</div>
        <button class="btn-unified btn-cyber-small" onclick="setPoint('B')">◀ B</button>
    </div>

    <div class="control-grid">
        <div class="play-col">
            <div class="metal-btn-wrap" onclick="jump()"><div class="metal-btn-inner"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></div></div>
            <div class="metal-btn-wrap" id="p-btn"><div class="metal-btn-inner"><svg id="p-svg" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>
        </div>

        <div class="tempo-panel">
            <div class="tempo-header">
                <span class="tempo-label">TEMPO</span>
                <div class="tempo-val-wrapper"><span id="t-txt">+0</span>%</div>
            </div>
            <div class="tempo-buttons-left">
                <button class="btn-unified btn-tempo-rect" onmousedown="startAdj(0.01)" ontouchstart="startAdj(0.01)" onmouseup="stopAdj()" ontouchend="stopAdj()">+</button>
                <button class="btn-unified btn-tempo-rect btn-minus" onmousedown="startAdj(-0.01)" ontouchstart="startAdj(-0.01)" onmouseup="stopAdj()" ontouchend="stopAdj()">-</button>
                <button class="btn-unified btn-tempo-rect btn-reset-rect" onclick="resT()">RESET</button>
            </div>
            <div class="slider-column" id="slider-col">
                <div class="tempo-lane-bg">
                    <div class="t-marker" style="top:0"></div>
                    <div class="t-marker" style="top:50%; transform:translate(-50%,-50%)"></div>
                    <div class="t-marker" style="bottom:0"></div>
                </div>
                <input type="range" class="v-slider" id="t-sld" min="0.5" max="1.5" step="0.01" value="1.0">
            </div>
        </div>
    </div>
</div>

<audio id="audio" playsinline></audio>

<script>
    const audio = document.getElementById('audio'), pBtn = document.getElementById('p-btn'), pSvg = document.getElementById('p-svg'), tSld = document.getElementById('t-sld');
    let tA = 0, tB = 0, dTarget = null, adjTimer = null;

    document.getElementById('file-trigger').onclick = () => document.getElementById('f-in').click();
    document.getElementById('f-in').onchange = (e) => {
        const file = e.target.files[0]; if(!file) return;
        audio.src = URL.createObjectURL(file); audio.load();
        audio.onloadedmetadata = () => { tA = 0; tB = audio.duration; updateUI(); resizeSlider(); };
        window.jsmediatags.read(file, { onSuccess: (tag) => {
            document.getElementById('m-tit').textContent = tag.tags.title || file.name;
            document.getElementById('m-art').textContent = tag.tags.artist || "Unknown Artist";
            if (tag.tags.picture) {
                const { data, format } = tag.tags.picture;
                let b64 = ""; for (let i = 0; i < data.length; i++) b64 += String.fromCharCode(data[i]);
                document.getElementById('art-box').innerHTML = `<img src="data:${format};base64,${window.btoa(b64)}">`;
            }
        }});
    };

    function setPoint(type) { if(!audio.duration) return; if(type==='A') tA=audio.currentTime; else tB=audio.currentTime; updateUI(); }
    
    function updateUI() {
        const dur = audio.duration || 1, cur = audio.currentTime;
        const s = Math.min(tA, tB), e = Math.max(tA, tB);
        document.getElementById('m-time').textContent = `${fT(cur)} / ${fT(dur)}`;
        document.getElementById('head-knob').style.left = (cur/dur*100)+'%';
        document.getElementById('tag-a').style.left = (tA/dur*100)+'%';
        document.getElementById('tag-b').style.left = (tB/dur*100)+'%';
        document.getElementById('v-a-mid').style.left = (tA/dur*100)+'%';
        document.getElementById('v-b-mid').style.left = (tB/dur*100)+'%';
        document.getElementById('bar-y').style.left = (s/dur*100)+'%';
        document.getElementById('bar-y').style.width = (cur > s ? (Math.min(cur, e)-s)/dur*100 : 0)+'%';
        document.getElementById('bar-w').style.left = (Math.max(cur, s)/dur*100)+'%';
        document.getElementById('bar-w').style.width = (e > Math.max(cur, s) ? (e-Math.max(cur, s))/dur*100 : 0)+'%';
        document.getElementById('ab-txt').textContent = `${fT(tA)} - ${fT(tB)}`;
        if (Math.abs(tA-tB) > 0.1 && (cur >= e - 0.02)) audio.currentTime = s;
    }

    function dragStart(e, type) { dTarget = type; handleMove(e); }
    function handleMove(e) {
        if(!dTarget || !audio.duration) return;
        const rect = document.getElementById('seek-cont').getBoundingClientRect();
        const x = (e.touches?e.touches[0].clientX:e.clientX) - rect.left - 20;
        const r = Math.max(0, Math.min(1, x/(rect.width-40)));
        const targetTime = r * audio.duration;
        if(dTarget==='A') { tA = targetTime; audio.currentTime = targetTime; }
        else if(dTarget==='B') tB = targetTime;
        else audio.currentTime = targetTime;
        updateUI();
    }
    
    window.onmousemove = handleMove; window.ontouchmove = handleMove;
    window.onmouseup = window.ontouchend = () => dTarget = null;
    audio.ontimeupdate = updateUI;
    pBtn.onclick = () => { 
        if(audio.paused) { audio.play(); pSvg.innerHTML='<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'; } 
        else { audio.pause(); pSvg.innerHTML='<path d="M8 5v14l11-7z"/>'; }
    };
    tSld.oninput = () => { 
        audio.playbackRate = tSld.value; 
        document.getElementById('t-txt').textContent = (tSld.value>=1?'+':'')+Math.round((tSld.value-1)*100); 
    };
    function resT() { tSld.value = 1.0; tSld.oninput(); }
    function jump() { audio.currentTime = tA; }
    function fT(s) { return `${Math.floor(s/60).toString().padStart(2,'0')}:${Math.floor(s%60).toString().padStart(2,'0')}`; }
    function startAdj(v) { adjTimer = setInterval(() => { tSld.value = (parseFloat(tSld.value)+v).toFixed(2); tSld.oninput(); }, 50); }
    function stopAdj() { clearInterval(adjTimer); }
    function resizeSlider() { 
        const col = document.getElementById('slider-col');
        if(col) tSld.style.width = col.offsetHeight + 'px'; 
    }
    window.onload = resizeSlider; window.onresize = resizeSlider;
</script>
</body>
</html>
