<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#030305">
    <title>ZEFRAM PLAYER NEO - iOS Optimized</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-blue-glow: rgba(0, 242, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.12);
            --metal-grad: conic-gradient(from 180deg at 50% 50%, #222, #555, #888, #555, #222);
            --trans: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            --font-main: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }

        body {
            background-color: #030305;
            color: #fff; margin: 0; 
            /* 調整：45pxと15pxの間をとって30pxに。これで「ちょうど良い上」を狙います */
            padding: 30px 5px 5px 5px; 
            font-family: var(--font-main);
            display: flex; justify-content: center; 
            /* 調整：極端な上寄せをやめ、中央基準に戻して安定させました */
            align-items: center; 
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
            position: fixed; width: 100%; height: 100%;
        }

        .player-canvas {
            width: 100%; max-width: 380px; 
            height: auto; 
            max-height: 92vh;
            background: rgba(15, 15, 25, 0.6); 
            backdrop-filter: blur(40px) saturate(160%);
            -webkit-backdrop-filter: blur(40px) saturate(160%);
            border: 1px solid var(--glass-border); 
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 35px;
            padding: 15px 15px 15px 15px; 
            box-shadow: 0 40px 80px rgba(0,0,0,0.9), inset 0 0 30px rgba(255, 255, 255, 0.02);
            display: flex; flex-direction: column;
            position: relative;
        }

        /* パーツのレイアウト（変更なし） */
        .dot-fs-trigger { position: absolute; top: 12px; right: 12px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1001; background: transparent; border: none; }
        .dot-inner { width: 6px; height: 6px; background: #fff; border-radius: 50%; box-shadow: 0 0 10px #fff, 0 0 20px #fff; }
        .header-title { text-align: center; font-size: 16px; font-weight: 900; letter-spacing: 2px; color: var(--neon-blue); margin-bottom: 8px; text-transform: uppercase; }
        .meta-area { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; height: 85px; }
        .art-box { width: 65px; height: 65px; border-radius: 10px; background: #000; border: 1.5px solid rgba(255, 255, 255, 0.1); overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .art-box img { width: 100%; height: 100%; object-fit: contain; }
        .info-col { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
        .marquee-container { width: 100%; overflow: hidden; white-space: nowrap; position: relative; }
        .title-style { font-size: 16px; font-weight: 900; color: #fff; }
        .artist-style { font-size: 12px; font-weight: 700; color: var(--neon-blue); opacity: 0.8; }
        #m-time { font-family: var(--font-main); font-size: 16px; font-weight: 900; margin-top: 4px; color: #fff; }
        .btn-unified { background: rgba(255,255,255,0.03); border: 1px solid var(--neon-blue); color: var(--neon-blue); font-weight: 800; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
        .btn-select { border-radius: 8px; height: 30px; width: 50px; font-size: 10px; }
        .seek-container { margin: 2px 0 10px 0; padding: 0 20px; position: relative; }
        .tag-lane { height: 28px; position: relative; }
        .ab-tag { position: absolute; width: 32px; height: 32px; border-radius: 50%; border: 1.2px solid var(--neon-blue); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900; top: 50%; transform: translate(-50%, -50%); color: var(--neon-blue); background: rgba(0,0,0,0.5); z-index: 100; }
        .main-lane { height: 36px; position: relative; display: flex; align-items: center; }
        .main-lane-bg { position: absolute; width: 100%; height: 8px; background: rgba(255,255,255,0.08); border-radius: 4px; }
        .bar-y { position: absolute; height: 5px; background: var(--neon-blue); box-shadow: 0 0 20px var(--neon-blue); border-radius: 3px; }
        .head-knob { position: absolute; width: 20px; height: 20px; border-radius: 50%; background: #fff; transform: translateX(-50%); box-shadow: 0 0 15px #fff; }
        .ab-jump-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 8px; }
        #ab-txt { font-family: var(--font-main); color: var(--neon-blue); font-weight: 900; font-size: 17px; min-width: 140px; text-align: center; }
        .control-grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 10px; margin-bottom: 5px; }
        .play-col { display: flex; flex-direction: column; align-items: center; justify-content: space-around; }
        .metal-btn-wrap { width: 75px; height: 75px; border-radius: 50%; background: var(--metal-grad); padding: 3px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        #p-btn { width: 100px; height: 100px; }
        .metal-btn-inner { width: 100%; height: 100%; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #252525, #050505); }
        .metal-btn-inner svg { width: 35px; height: 35px; fill: var(--neon-blue); }
        .tempo-panel { background: rgba(255, 255, 255, 0.04); border-radius: 25px; padding: 12px; border: 1px solid var(--glass-border); display: flex; flex-direction: column; min-height: 180px; }
        .tempo-label { font-size: 10px; color: var(--neon-blue); font-weight: 800; }
        .tempo-val-wrapper { color: #fff; font-size: 18px; font-weight: 900; }
        .tempo-controls { flex: 1; display: flex; gap: 10px; align-items: center; justify-content: center; position: relative; }
        .slider-wrapper { position: relative; height: 100%; width: 35px; display: flex; justify-content: center; align-items: center; }
        .v-slider { -webkit-appearance: none; position: absolute; width: 100px; transform: rotate(-90deg); background: transparent; cursor: pointer; }
        .v-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: #fff; }
        .btn-reset-glass { width: 100%; padding: 10px; border-radius: 12px; font-size: 10px; font-weight: 700; border: 1px solid rgba(255, 255, 255, 0.1); margin-top: 10px; }
        .btn-step-iso { width: 42px; height: 42px; border-radius: 12px; font-size: 22px; border: 1px solid rgba(0, 242, 255, 0.3); }
        .btn-cyber-large { border-radius: 14px; padding: 12px 0; flex: 1; font-size: 15px; }
    </style>
</head>
<body>

<div class="player-canvas">
    <button class="dot-fs-trigger" id="dot-btn"><div class="dot-inner"></div></button>
    <div class="header-title">ZEFRAM PLAYER NEO</div>
    <div class="meta-area">
        <div id="art-box" class="art-box"></div>
        <div class="info-col">
            <div class="marquee-container"><span id="m-tit" class="title-style">No File</span></div>
            <div class="marquee-container"><span id="m-art" class="artist-style">Select track</span></div>
            <div id="m-time">00:00 / 00:00</div>
        </div>
        <button class="btn-unified btn-select" id="file-trigger" onclick="document.getElementById('f-in').click()">FILE</button>
        <input type="file" id="f-in" hidden accept="audio/*">
    </div>

    <div class="seek-container" id="seek-cont">
        <div class="tag-lane"><div class="ab-tag" id="tag-a" style="left:0">A</div></div>
        <div class="main-lane">
            <div class="main-lane-bg"></div>
            <div id="bar-y" class="bar-y" style="left:0; width:0;"></div>
            <div id="head-knob" class="head-knob" style="left:0"></div>
        </div>
        <div class="tag-lane"><div class="ab-tag" id="tag-b" style="left:100%">B</div></div>
    </div>

    <div class="ab-jump-row">
        <button class="btn-unified btn-cyber-large">A ▶</button>
        <div id="ab-txt">00:00 - 00:00</div>
        <button class="btn-unified btn-cyber-large">◀ B</button>
    </div>

    <div class="control-grid">
        <div class="play-col">
            <div class="metal-btn-wrap"><div class="metal-btn-inner"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></div></div>
            <div class="metal-btn-wrap" id="p-btn"><div class="metal-btn-inner"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>
        </div>
        <div class="tempo-panel">
            <span class="tempo-label">TEMPO</span>
            <div class="tempo-val-wrapper"><span id="t-txt">+0</span>%</div>
            <div class="tempo-controls">
                <div style="display:flex; flex-direction:column; gap:10px;">
                    <button class="btn-unified btn-step-iso">+</button>
                    <button class="btn-unified btn-step-iso">-</button>
                </div>
                <div class="slider-wrapper">
                    <input type="range" class="v-slider" id="t-sld" min="0.5" max="1.5" step="0.01" value="1.0">
                </div>
            </div>
            <button class="btn-unified btn-reset-glass">RESET</button>
        </div>
    </div>
</div>

<audio id="audio" playsinline></audio>

</body>
</html>
